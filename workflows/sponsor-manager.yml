name: Sponsor Team Manager

on:
  sponsorship:
    types: [created, cancelled, tier_changed, pending_cancellation]

jobs:
  manage-sponsor:
    runs-on: ubuntu-latest
    steps:
      - name: Handle sponsor event
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const event = context.payload;
            const sponsor = event.sponsorship.sponsor.login;
            const tierName = event.sponsorship.tier.name;
            const tierPrice = event.sponsorship.tier.monthly_price_in_dollars;
            const action = event.action;
            const org = 'AnkleBreaker-Studio';
            const teamSlug = 'sponsors';

            // Backer tier ($15) and above get team access
            const MIN_TIER_PRICE = 15;

            console.log(`Sponsor event: ${action}`);
            console.log(`Sponsor: ${sponsor}`);
            console.log(`Tier: ${tierName} ($${tierPrice}/month)`);

            if (action === 'created' || action === 'tier_changed') {
              if (tierPrice >= MIN_TIER_PRICE) {
                // Add sponsor to team
                try {
                  await github.rest.teams.addOrUpdateMembershipForUserInOrg({
                    org: org,
                    team_slug: teamSlug,
                    username: sponsor,
                    role: 'member'
                  });
                  console.log(`✅ Added ${sponsor} to ${teamSlug} team (${tierName} - $${tierPrice}/month)`);
                } catch (error) {
                  console.error(`❌ Failed to add ${sponsor}: ${error.message}`);
                }
              } else if (action === 'tier_changed') {
                // Downgraded below minimum tier — remove from team
                try {
                  await github.rest.teams.removeMembershipForUserInOrg({
                    org: org,
                    team_slug: teamSlug,
                    username: sponsor
                  });
                  console.log(`⬇️ Removed ${sponsor} from ${teamSlug} team (downgraded to ${tierName} - $${tierPrice}/month)`);
                } catch (error) {
                  console.log(`Note: ${sponsor} may not have been in team: ${error.message}`);
                }
              }
            }

            if (action === 'cancelled' || action === 'pending_cancellation') {
              // Remove sponsor from team
              try {
                await github.rest.teams.removeMembershipForUserInOrg({
                  org: org,
                  team_slug: teamSlug,
                  username: sponsor
                });
                console.log(`🚫 Removed ${sponsor} from ${teamSlug} team (sponsorship ${action})`);
              } catch (error) {
                console.log(`Note: ${sponsor} may not have been in team: ${error.message}`);
              }
            }
